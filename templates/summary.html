<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>Israel-Iran War — Alert Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#12122a;--card2:#1a1a3a;--border:#2a2a4a;--text:#e4e4f0;--text2:#8888aa;--accent:#6366f1;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;--blue:#3b82f6;--glow:rgba(99,102,241,.15)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
body.en{direction:ltr;text-align:left}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0f0f2a,#1a1040);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,#ef4444,#f97316);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 20px rgba(239,68,68,.3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(239,68,68,.3)}50%{box-shadow:0 0 35px rgba(239,68,68,.5)}}
.hdr h1{font-size:13px;font-weight:900;color:#fff;line-height:1.2}
.hdr-sub{font-size:10px;color:var(--text2);font-weight:600}
.hdr-btns{display:flex;gap:4px}
.hdr-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;color:#c7d2fe;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter';min-height:34px;min-width:34px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

/* SEARCH */
.search-wrap{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:15}
.search-box{width:100%;padding:11px 16px;border:2px solid var(--border);border-radius:12px;font-size:16px;font-family:'Inter';background:var(--bg);color:var(--text);outline:none;transition:border .2s}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.search-box::placeholder{color:var(--text2)}
.sr{background:var(--card);border:1px solid var(--border);border-radius:12px;max-height:250px;overflow-y:auto;margin-top:6px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.sr.show{display:block}
.sr div{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;cursor:pointer;display:flex;justify-content:space-between}
.sr div:active{background:var(--card2)}

/* CONTENT */
.content{padding:12px 16px;max-width:600px;margin:0 auto}

/* LIVE TICKER */
.ticker{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3);border-radius:14px;padding:12px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.ticker::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(239,68,68,.06),transparent);animation:scan 4s linear infinite}
@keyframes scan{to{left:100%}}
.ticker-label{font-size:9px;color:var(--red);font-weight:800;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.ticker-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ticker-time{font-size:15px;font-weight:900;margin-top:4px;color:#fff}
.ticker-detail{font-size:11px;color:var(--text2);margin-top:4px}

/* STAT GRID */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;right:0;left:0;height:2px}
.stat.r::before{background:var(--red)}.stat.b::before{background:var(--blue)}
.stat.g::before{background:var(--green)}.stat.o::before{background:var(--orange)}
.stat.p::before{background:var(--accent)}.stat.full{grid-column:1/-1}
.stat .lbl{font-size:9px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat .val{font-size:30px;font-weight:900;margin-top:2px;line-height:1;color:#fff}
.stat.r .val{color:var(--red)}.stat.b .val{color:var(--blue)}.stat.g .val{color:var(--green)}.stat.o .val{color:var(--orange)}.stat.p .val{color:var(--accent)}
.stat .sub{font-size:10px;color:var(--text2);margin-top:4px}
.stat .icon{position:absolute;bottom:8px;left:8px;font-size:24px;opacity:.1}
body.en .stat .icon{left:auto;right:8px}

/* CITY CARD */
.city-card{background:linear-gradient(135deg,var(--card),var(--card2));border:2px solid var(--accent);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 0 30px var(--glow)}
.city-card h2{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
.city-card .zone{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:10px}
.city-card .cg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.city-card .ci{text-align:center;background:rgba(255,255,255,.04);border-radius:10px;padding:8px}
.city-card .cv{font-size:22px;font-weight:900;color:#fff}
.city-card .cl{font-size:8px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* LIST */
.list{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.list-h{padding:10px 16px;font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--card2);border-bottom:1px solid var(--border)}
.list-item{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center;font-size:13px;cursor:pointer}
.list-item:active{background:var(--card2)}
.list-count{font-weight:900;color:var(--red)}
.bar{height:2px;background:rgba(255,255,255,.05);margin:0 16px 4px}
.bar-fill{height:100%;border-radius:1px}

/* CHART (CSS-only) */
.h-chart{display:flex;align-items:flex-end;gap:1px;padding:12px 16px;height:100px}
.h-bar{flex:1;border-radius:2px 2px 0 0;transition:height .3s;min-height:2px;position:relative}
.h-bar:active::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--card2);color:#fff;padding:4px 8px;border-radius:6px;font-size:10px;white-space:nowrap;z-index:5}
.h-labels{display:flex;gap:1px;padding:0 16px 8px;font-size:7px;color:var(--text2)}
.h-labels span{flex:1;text-align:center}

/* EXPLAIN */
.explain{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;line-height:1.7;color:var(--text2)}
.explain b{color:var(--accent)}

/* RECENT */
.recent-item{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:10px;align-items:flex-start}
.recent-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.recent-body{flex:1}
.recent-time{font-size:11px;font-weight:700;color:var(--text)}
.recent-detail{font-size:10px;color:var(--text2);margin-top:2px}

/* FOOTER */
footer{padding:20px 16px;text-align:center;font-size:9px;color:var(--text2);line-height:1.8;border-top:1px solid var(--border);margin-top:12px}
footer a{color:var(--accent);text-decoration:none}

@media(min-width:500px){.stats{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🚨</div>
    <div><h1 id="h-title">מלחמת ישראל-איראן</h1><div class="hdr-sub" id="h-sub">טוען...</div></div>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" onclick="refreshData()" id="refresh-btn">🔄</button>
    <button class="hdr-btn" onclick="toggleLang()">EN/עב</button>
  </div>
</div>

<div class="search-wrap">
  <input class="search-box" id="search" type="text" placeholder="🔍 חפש עיר או אזור..." autocomplete="off">
  <div class="sr" id="sr"></div>
</div>

<div class="content" id="content"></div>

<footer>
  <span id="f-period">נתונים מ-28.2.2026</span> · <a href="/">Command Center ↗</a><br>
  <span style="font-size:8px">מקור: ערוץ טלגרם PikudHaOref_all · עדכון אחרון: <span id="f-last">—</span></span>
</footer>

<script>
const WAR='2026-02-28';
const api=async(u,o)=>(await fetch(u,o)).json();
let allC=[],allZ=[];
let L='he',D=null,lastN=0;

const T={
he:{title:'מלחמת ישראל-איראן',ph:'🔍 חפש עיר או אזור...',
events:'אירועי תקיפה',city_alerts:'התרעות עיר',zones_hit:'אזורים',cities_hit:'ערים',days:'ימי מלחמה',
latest:'התרעה אחרונה',avgday:'ממוצע ליום',busiest_h:'שעה עמוסה',alert_days:'ימי התרעה',
rockets:'רקטות',aircraft:'כלי טיס',top_cities:'ערים מותקפות',top_zones:'אזורים מותקפים',
types:'סוגי איומים',recent:'התרעות אחרונות',busiest_day:'היום הכי עמוס',hourly:'התפלגות שעתית',
back:'חזור לסקירה',exp1:'<b>אירוע תקיפה</b> = קבוצת הודעות תוך 2 דק\' = 1 אירוע',
exp2:'<b>התרעת עיר</b> = כל עיר בהודעה = 1. הודעה ל-5 ערים = 5 התרעות',period:'מ-28.2.2026'},
en:{title:'Israel-Iran War',ph:'🔍 Search city or zone...',
events:'Attack Events',city_alerts:'City Alerts',zones_hit:'Zones',cities_hit:'Cities',days:'Days of War',
latest:'Latest Alert',avgday:'Avg/Day',busiest_h:'Peak Hour',alert_days:'Alert Days',
rockets:'Rockets',aircraft:'Aircraft',top_cities:'Most Attacked Cities',top_zones:'Most Hit Zones',
types:'Threat Types',recent:'Recent Alerts',busiest_day:'Busiest Day',hourly:'Hourly Distribution',
back:'Back to Overview',exp1:'<b>Attack Event</b> = messages within 2 min = 1 event',
exp2:'<b>City Alert</b> = each city in a message = 1 count',period:'Since Feb 28, 2026'}
};
const t=k=>T[L][k]||k;

function toggleLang(){
  L=L==='he'?'en':'he';document.body.classList.toggle('en',L==='en');
  document.documentElement.lang=L;document.documentElement.dir=L==='he'?'rtl':'ltr';
  document.getElementById('h-title').textContent=t('title');
  document.getElementById('search').placeholder=t('ph');
  render();
}

async function init(){await loadData();setInterval(checkNew,60000);}
async function loadData(){
  const [d,o]=await Promise.all([api('/api/summary?date_from='+WAR),api('/api/filter_options')]);
  D=d;lastN=d.total_alerts;allC=o.cities;allZ=o.zones;render();
}
async function refreshData(){
  const b=document.getElementById('refresh-btn');b.textContent='⏳';b.disabled=true;
  try{await api('/api/refresh_db',{method:'POST'});await loadData();}finally{b.textContent='🔄';b.disabled=false;}
}
async function checkNew(){
  try{const d=await api('/api/summary?date_from='+WAR);if(d.total_alerts!==lastN){D=d;lastN=d.total_alerts;render();}}catch(e){}
}

function render(){
  if(!D)return;
  const el=document.getElementById('content');
  const days=Math.max(1,Math.round((Date.now()-new Date(WAR+'T00:00:00'))/(864e5)));
  const epd=(D.attack_events/days).toFixed(1);
  document.getElementById('h-sub').textContent=`${D.attack_events} ${t('events')} · ${t('period')}`;
  document.getElementById('f-last').textContent=D.latest?.time?.slice(0,16)||'—';
  let h='';

  // Latest alert
  if(D.latest){
    const la=D.latest;
    h+=`<div class="ticker">
      <div class="ticker-label">${t('latest')}</div>
      <div class="ticker-time">${la.time?.slice(11,16)||''} IST · ${la.type==='rockets'?'🚀 '+t('rockets'):'✈️ '+t('aircraft')}</div>
      <div class="ticker-detail">${la.zones||''} — ${la.cities||''}</div>
    </div>`;
  }

  // City detail
  if(D.city){
    const c=D.city;
    h+=`<div class="city-card">
      <h2>${c.name}</h2>
      <div class="zone">${c.zones?.join(', ')||''}</div>
      <div class="cg">
        <div class="ci"><div class="cv" style="color:var(--red)">${c.alerts}</div><div class="cl">${t('city_alerts')}</div></div>
        <div class="ci"><div class="cv" style="color:var(--accent)">${c.avg_per_day}</div><div class="cl">${t('avgday')}</div></div>
        <div class="ci"><div class="cv" style="color:var(--orange)">${c.alert_days}</div><div class="cl">${t('alert_days')}</div></div>
      </div>
      <div class="cg" style="margin-top:8px">
        <div class="ci"><div class="cv" style="color:var(--blue)">${String(c.busiest_hour??'—').padStart(2,'0')}:00</div><div class="cl">${t('busiest_h')}</div></div>
        ${c.by_type?.map(bt=>`<div class="ci"><div class="cv" style="color:${bt.alert_type==='rockets'?'var(--red)':'var(--blue)'}">${bt.count}</div><div class="cl">${bt.alert_type==='rockets'?'🚀':'✈️'} ${bt.alert_type}</div></div>`).join('')||''}
      </div>
    </div>`;
    // Hourly chart
    if(c.hourly?.length){
      const mx=Math.max(...c.hourly.map(h=>h.count),1);
      h+=`<div class="list"><div class="list-h">🕐 ${t('hourly')}</div>
        <div class="h-chart">${Array.from({length:24},(_,hr)=>{
          const v=c.hourly.find(x=>x.hour===hr);const cnt=v?v.count:0;
          const pct=Math.max(3,Math.round(100*cnt/mx));
          const col=cnt===mx?'var(--red)':cnt>mx*.5?'var(--orange)':'var(--accent)';
          return`<div class="h-bar" style="height:${pct}%;background:${col}" data-tip="${hr}:00 — ${cnt}"></div>`;
        }).join('')}</div>
        <div class="h-labels">${Array.from({length:24},(_,h)=>`<span>${h%4===0?h:''}</span>`).join('')}</div>
      </div>`;
    }
    h+=`<div style="text-align:center;margin-bottom:14px"><button class="hdr-btn" onclick="clearCity()" style="font-size:12px;padding:8px 20px">← ${t('back')}</button></div>`;
  } else {
    // Global overview
    h+=`<div class="stats">
      <div class="stat r"><div class="lbl">${t('events')}</div><div class="val">${D.attack_events.toLocaleString()}</div><div class="sub">${epd}/${L==='he'?'יום':'day'}</div><div class="icon">💥</div></div>
      <div class="stat o"><div class="lbl">${t('city_alerts')}</div><div class="val">${D.total_city_alerts.toLocaleString()}</div><div class="sub">${D.total_alerts.toLocaleString()} msg</div><div class="icon">🏙️</div></div>
      <div class="stat b"><div class="lbl">${t('cities_hit')}</div><div class="val">${D.total_cities.toLocaleString()}</div><div class="icon">📍</div></div>
      <div class="stat g"><div class="lbl">${t('zones_hit')}</div><div class="val">${D.total_zones}</div><div class="icon">🗺️</div></div>
      <div class="stat p"><div class="lbl">${t('days')}</div><div class="val">${days}</div><div class="sub">${t('period')}</div><div class="icon">📅</div></div>
      ${D.busiest_day?`<div class="stat r"><div class="lbl">${t('busiest_day')}</div><div class="val">${D.busiest_day.count}</div><div class="sub">${D.busiest_day.date}</div><div class="icon">🔥</div></div>`:''}
    </div>`;
    h+=`<div class="explain">${t('exp1')}<br>${t('exp2')}</div>`;

    // Threat types
    if(D.by_type?.length){
      const tot=D.by_type.reduce((s,t)=>s+t.count,0);
      h+=`<div class="list"><div class="list-h">🎯 ${t('types')}</div>
        ${D.by_type.map(bt=>{
          const pct=Math.round(100*bt.count/tot);
          const col=bt.alert_type==='rockets'?'var(--red)':'var(--blue)';
          return`<div class="list-item"><span>${bt.alert_type==='rockets'?'🚀':'✈️'} ${bt.alert_type}</span><span style="font-weight:900;color:${col}">${bt.count.toLocaleString()} <span style="font-size:10px;color:var(--text2)">${pct}%</span></span></div>
          <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>`;
        }).join('')}
      </div>`;
    }

    // Top cities
    if(D.top_cities?.length){
      const mx=D.top_cities[0].alerts;
      h+=`<div class="list"><div class="list-h">🏙️ ${t('top_cities')}</div>
        ${D.top_cities.map((c,i)=>`<div class="list-item" onclick="searchCity('${c.city_name.replace(/'/g,"\\'")}')">
          <span style="font-weight:600"><span style="color:var(--text2);font-size:11px">${i+1}.</span> ${c.city_name}</span>
          <span class="list-count">${c.alerts.toLocaleString()}</span>
        </div><div class="bar"><div class="bar-fill" style="width:${Math.round(100*c.alerts/mx)}%;background:linear-gradient(90deg,var(--red),var(--orange))"></div></div>`).join('')}
      </div>`;
    }

    // Top zones
    if(D.top_zones?.length){
      h+=`<div class="list"><div class="list-h">🗺️ ${t('top_zones')}</div>
        ${D.top_zones.map((z,i)=>`<div class="list-item" onclick="searchZone('${z.zone_name.replace(/'/g,"\\'")}')">
          <span style="font-weight:600">${i+1}. ${z.zone_name}</span>
          <span style="font-weight:900;color:var(--accent)">${z.alerts.toLocaleString()}</span>
        </div>`).join('')}
      </div>`;
    }

    // Recent alerts
    if(D.recent_alerts?.length){
      h+=`<div class="list"><div class="list-h">⏱️ ${t('recent')}</div>
        ${D.recent_alerts.map(a=>`<div class="recent-item">
          <div class="recent-dot" style="background:${a.alert_type==='rockets'?'var(--red)':'var(--blue)'}"></div>
          <div class="recent-body">
            <div class="recent-time">${a.datetime_israel?.slice(5,16)||''} · ${a.alert_type==='rockets'?'🚀':'✈️'} ${a.city_count} ${L==='he'?'ערים':'cities'}</div>
            <div class="recent-detail">${a.zones||''}</div>
          </div>
        </div>`).join('')}
      </div>`;
    }
  }
  el.innerHTML=h;
}

// Search
const si=document.getElementById('search'),sr=document.getElementById('sr');
si.addEventListener('input',()=>{
  const q=si.value.trim().toLowerCase();
  if(!q){sr.classList.remove('show');return;}
  const cm=allC.filter(c=>c.toLowerCase().includes(q)).slice(0,15);
  const zm=allZ.filter(z=>z.toLowerCase().includes(q)).slice(0,5);
  const items=[...zm.map(z=>({n:z,t:'zone'})),...cm.map(c=>({n:c,t:'city'}))];
  if(!items.length){sr.classList.remove('show');return;}
  sr.innerHTML=items.map(i=>`<div onclick="${i.t==='city'?`searchCity('${i.n.replace(/'/g,"\\'")}')`:`searchZone('${i.n.replace(/'/g,"\\'")}')`}">
    <span>${i.t==='zone'?'🗺️':'🏙️'} ${i.n}</span>
    <span style="font-size:10px;color:var(--text2)">${i.t==='zone'?(L==='he'?'אזור':'zone'):(L==='he'?'עיר':'city')}</span>
  </div>`).join('');
  sr.classList.add('show');
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sr.classList.remove('show');});

async function searchCity(n){si.value=n;sr.classList.remove('show');D=await api('/api/summary?date_from='+WAR+'&city='+encodeURIComponent(n));render();window.scrollTo({top:0,behavior:'smooth'});}
async function searchZone(n){si.value=n;sr.classList.remove('show');D=await api('/api/summary?date_from='+WAR+'&zone='+encodeURIComponent(n));render();window.scrollTo({top:0,behavior:'smooth'});}
async function clearCity(){si.value='';D=await api('/api/summary?date_from='+WAR);render();}

init();
</script>
</body>
</html>
